name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            output_name: SQLiteMania-linux
          - os: windows-latest
            output_name: SQLiteMania-windows.exe
          - os: macos-latest
            output_name: SQLiteMania-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: >
          pyinstaller
          --onefile
          --name "${{ matrix.output_name }}"
          --add-data "weapon_name.json${{ matrix.os == 'windows-latest' && ';' || ':' }}."
          --add-data "armor_name.json${{ matrix.os == 'windows-latest' && ';' || ':' }}."
          --add-data "game_data.db${{ matrix.os == 'windows-latest' && ';' || ':' }}."
          main.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/${{ matrix.output_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "SQLite Mania — Build ${{ github.run_number }}"
          files: |
            dist/SQLiteMania-linux/SQLiteMania-linux
            dist/SQLiteMania-windows.exe/SQLiteMania-windows.exe
            dist/SQLiteMania-macos/SQLiteMania-macos
